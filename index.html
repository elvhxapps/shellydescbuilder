<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ELVHX Product HTML Builder</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<header>
  <div class="row header-content">
    <div>
      <h1>ELVHX Product HTML Builder (GR/EN)</h1>
      <div class="hint">Φόρμα → Preview → Export HTML. Με <span class="kbd">Import</span> ξαναφορτώνεις κώδικα.</div>
    </div>
    <div class="row">
      <span class="chip" id="statusChip">Ready</span>
      <button class="btn ghost" id="btnReset">Reset</button>
      <button class="btn" id="btnImport">Import</button>
      <button class="btn primary" id="btnExport">Export</button>
    </div>
  </div>
</header>

<main>
  <section class="panel">
    <div class="hd">
      <div class="title">Content Settings</div>
      <div class="row">
        <label style="margin:0; font-weight:800;">Language</label>
        <select id="lang" style="width:auto;">
          <option value="gr">Greek (GR)</option>
          <option value="en">English (EN)</option>
        </select>
      </div>
    </div>
    <div class="bd" id="formArea">
      <div>
        <label>Top Image URL (optional)</label>
        <textarea id="topImage" class="mono" rows="2" placeholder="https://... image url for top"></textarea>
      </div>
      
      <div class="hr"></div>

      <div class="grid">
        <div>
          <label>Title</label>
          <textarea id="title" rows="2" placeholder="e.g. Shelly PRO 1..."></textarea>
        </div>
        <div>
          <label>Product code (optional)</label>
          <input id="code" placeholder="e.g. 10478" />
        </div>
      </div>

      <div style="margin-top:10px;">
        <label>Short description</label>
        <textarea id="desc" rows="3"></textarea>
      </div>

      <div style="margin-top:10px;">
        <label>Bullets (one per line)</label>
        <textarea id="bullets" rows="4"></textarea>
      </div>

      <div class="hr"></div>

      <div class="grid">
        <div>
          <label>Manual PDF URL</label>
          <textarea id="manualUrl" class="mono" rows="2"></textarea>
        </div>
        <div>
          <label>Manual label</label>
          <textarea id="manualLabel" rows="2"></textarea>
        </div>
      </div>

      <div class="grid" style="margin-top:10px;">
        <div>
          <label>Main YouTube URL</label>
          <textarea id="youtubeUrl" class="mono" rows="2"></textarea>
        </div>
        <div>
          <label>Video button label</label>
          <textarea id="videoBtnLabel" rows="2"></textarea>
        </div>
      </div>

      <div class="grid" style="margin-top:10px;">
        <div>
          <label>Diagrams URL</label>
          <textarea id="diagramsUrl" class="mono" rows="2"></textarea>
        </div>
        <div>
          <label>Diagrams main label</label>
          <textarea id="diagramsLabel" rows="2"></textarea>
        </div>
      </div>

      <div style="margin-top:10px;">
        <label>Diagrams subtitle</label>
        <textarea id="diagramsSub" rows="2"></textarea>
      </div>

      <div class="hr"></div>

      <div class="row" style="justify-content:space-between;">
        <div class="title" style="font-weight:900;">Extra buttons</div>
        <button class="btn small" id="btnAddButton">+ Add button</button>
      </div>
      <div class="list" id="buttonsList" style="margin-top:10px;"></div>

      <div class="hr"></div>

      <div class="row" style="justify-content:space-between;">
        <div class="title" style="font-weight:900;">Extra Videos (Grid)</div>
        <button class="btn small" id="btnAddVideo">+ Add Video</button>
      </div>
      <div class="list" id="videosList" style="margin-top:10px;"></div>

    </div>
  </section>

  <section class="panel sticky-panel">
    <div class="hd">
      <div class="title">Preview & HTML</div>
      <div class="row">
        <button class="btn" id="btnCopy">Copy HTML</button>
        <button class="btn ghost" id="btnDownload">Download .html</button>
      </div>
    </div>
    <div class="previewWrap">
      <div class="previewBox">
        <div class="inside" id="preview"></div>
      </div>
      <div class="hr"></div>
      <label>Exported HTML (Paste into product description)</label>
      <textarea id="output" class="codeArea" spellcheck="false"></textarea>
    </div>
  </section>
</main>

<div id="modal" class="modal-overlay" style="display:none;">
  <div class="modal-box">
    <div class="row" style="justify-content:space-between; margin-bottom:10px;">
      <div style="font-weight:900;">Import HTML</div>
      <button class="btn small" id="btnClose">Close</button>
    </div>
    <textarea id="importArea" class="codeArea" style="min-height:200px;"></textarea>
    <div class="row" style="justify-content:flex-end; margin-top:10px;">
      <button class="btn primary" id="btnDoImport">Import</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
